services:
  # 1. NODE.JS BACKEND
  - type: web
    name: railwise-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard from your DB URL
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: railwise-ml-engine
          envVarKey: RENDER_EXTERNAL_URL

  # 2. PYTHON ML ENGINE
  - type: web
    name: railwise-ml-engine
    env: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn predict_server:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # 3. VITE REACT FRONTEND (STATIC)
  - type: static
    name: railwise-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: railwise-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

